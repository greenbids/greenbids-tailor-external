apiVersion: v1
kind: Service
metadata:
  name: {{ include "greenbids-tailor.fullname" . }}
  labels:
    {{- include "greenbids-tailor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  {{- if .Values.otelExporterPrometheus.enabled }}
    - port: {{ .Values.otelExporterPrometheus.port }}
      targetPort: {{ .Values.otelExporterPrometheus.targetPort }}
      protocol: TCP
      name: prom
  {{- end }}
  selector:
    {{- include "greenbids-tailor.selectorLabels" . | nindent 4 }}
